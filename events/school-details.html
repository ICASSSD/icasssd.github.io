<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research School Details | ICASSSD</title>
    <meta name="description" content="Detailed information about the ICASSSD Research School.">

    <!-- External Styles & Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../styles/tailwind.config.js"></script>
    <script src="../scripts/utils.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">

    <style>
        .splide__slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Custom Slider Styles since we are not using a library for now to keep it lightweight */
        .slider-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 500px;
            /* Adjust as needed */
            border-radius: 1rem;
        }

        .slider-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
        }

        .slider-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .slider-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-nav button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.5);
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            z-index: 10;
        }

        .slider-nav button:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .prev-slide {
            left: 20px;
        }

        .next-slide {
            right: 20px;
        }

        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            border: none;
        }

        .slider-dot.active {
            background: white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body class="font-sans text-gray-800 antialiased bg-gray-50 flex flex-col min-h-screen">

    <!-- Navigation -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-16">

        <div id="loading-indicator" class="flex justify-center items-center h-64">
            <i class="fas fa-circle-notch fa-spin text-4xl text-teal-600"></i>
        </div>

        <div id="school-content" class="hidden">
            <!-- Hero Section for the specific school -->
            <div class="relative bg-teal-900 text-white py-20 mb-12">
                <div class="absolute inset-0 opacity-10">
                    <img src="../images/background1.jpg" alt="Background" class="w-full h-full object-cover">
                </div>
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                    <a href="research-school.html"
                        class="inline-flex items-center text-teal-200 hover:text-white transition-colors mb-6 font-medium">
                        <i class="fas fa-arrow-left mr-2"></i> Back to All Schools
                    </a>
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <span id="school-year-badge"
                                class="inline-block px-3 py-1 bg-white/10 backdrop-blur-md rounded-full text-sm font-semibold mb-4 border border-white/20">Year</span>
                            <h1 id="school-title" class="text-3xl md:text-5xl font-bold leading-tight">School Title</h1>
                        </div>
                        <div class="md:text-right">
                            <div class="text-xl font-light text-teal-100" id="school-date">Date Range</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                <!-- Description -->
                <div class="mb-16 max-w-4xl">
                    <h2 class="text-2xl font-bold text-teal-900 mb-6 border-b-2 border-teal-100 pb-2 inline-block">About
                        the School</h2>
                    <p id="school-description" class="text-xl text-gray-700 leading-relaxed font-light">
                        Description goes here.
                    </p>
                </div>

                <!-- Projects Showcase Section -->
                <div id="projects-section" class="mb-20 hidden">
                    <h2 class="text-2xl font-bold text-teal-900 mb-8 border-b-2 border-teal-100 pb-2 inline-block">
                        Student Projects</h2>

                    <div
                        class="relative group bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 min-h-[500px]">
                        <!-- Slider Content -->
                        <div id="slider-track" class="h-full relative">
                            <!-- Slides Injected via JS -->
                        </div>

                        <!-- Navigation Buttons -->
                        <button id="prev-slide"
                            class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/90 p-3 rounded-full shadow-lg hover:bg-teal-500 hover:text-white transition-all z-20 hidden md:block border border-gray-100">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button id="next-slide"
                            class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/90 p-3 rounded-full shadow-lg hover:bg-teal-500 hover:text-white transition-all z-20 hidden md:block border border-gray-100">
                            <i class="fas fa-chevron-right"></i>
                        </button>

                        <!-- Dots -->
                        <div id="slider-dots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex space-x-2 z-20">
                            <!-- Dots Injected via JS -->
                        </div>
                    </div>
                </div>

                <!-- Participants Section -->
                <div id="participants-section" class="mb-20 hidden">
                    <h2 class="text-2xl font-bold text-teal-900 mb-8 border-b-2 border-teal-100 pb-2 inline-block">
                        Participants</h2>
                    <div id="participants-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Injected via JS -->
                    </div>
                </div>

                <!-- Two Column Layout: Objectives & Topics -->
                <div class="grid md:grid-cols-2 gap-12 mb-20">
                    <!-- Objectives -->
                    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
                        <h3 class="text-xl font-bold text-dark mb-6 flex items-center">
                            <div
                                class="w-10 h-10 rounded-full bg-teal-50 flex items-center justify-center mr-4 text-teal-600">
                                <i class="fas fa-bullseye"></i>
                            </div>
                            Objectives
                        </h3>
                        <ul id="school-objectives" class="space-y-4">
                            <!-- Injected -->
                        </ul>
                    </div>

                    <!-- Topics -->
                    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
                        <h3 class="text-xl font-bold text-dark mb-6 flex items-center">
                            <div
                                class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center mr-4 text-amber-500">
                                <i class="fas fa-lightbulb"></i>
                            </div>
                            Key Topics
                        </h3>
                        <div id="school-topics" class="flex flex-wrap gap-3">
                            <!-- Injected -->
                        </div>
                    </div>
                </div>

                <!-- Publications Section -->
                <div id="publications-section" class="mb-20 hidden">
                    <h2 class="text-2xl font-bold text-teal-900 mb-8 border-b-2 border-teal-100 pb-2 inline-block">
                        Publications</h2>
                    <div id="publications-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- Injected via JS -->
                    </div>
                </div>

                <!-- News & Competitions Section -->
                <div id="news-section" class="mb-20 hidden">
                    <h2 class="text-2xl font-bold text-teal-900 mb-8 border-b-2 border-teal-100 pb-2 inline-block">News
                    </h2>
                    <div id="news-grid" class="space-y-6">
                        <!-- Injected via JS -->
                    </div>
                </div>

                <!-- Schedule -->
                <div class="bg-gray-50 rounded-3xl p-8 md:p-12 mb-20">
                    <h3 class="text-2xl font-bold text-dark mb-8 text-center">Schedule Highlights</h3>
                    <div class="max-w-3xl mx-auto relative border-l-2 border-teal-200 ml-4 md:ml-0 md:border-l-0 md:pl-0 space-y-8"
                        id="school-schedule">
                        <!-- Injected -->
                    </div>
                </div>

                <!-- CTA -->
                <div class="text-center mb-16">
                    <div id="apply-section"></div>
                </div>

            </div>
        </div>

        <!-- Error State -->
        <div id="error-message" class="hidden max-w-2xl mx-auto mt-20 text-center px-4">
            <div class="text-6xl text-gray-300 mb-6"><i class="fas fa-exclamation-circle"></i></div>
            <h2 class="text-3xl font-bold text-gray-800 mb-4">School Not Found</h2>
            <p class="text-gray-600 mb-8">We couldn't find the research school you're looking for.</p>
            <a href="research-school.html"
                class="inline-block bg-teal-600 text-white font-bold px-8 py-3 rounded-full hover:bg-teal-700 transition-colors">
                View All Schools
            </a>
        </div>

    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../scripts/layout.js"></script>
    <script src="../scripts/school-details.js"></script>
</body>

</html>
